<div class="container">
  <div class="card">

    <div class="logo">
      <span class="logo-icon">📈</span>
      <span class="logo-text">TradeGuard</span>
    </div>

    <h2>Create account</h2>
    <p class="subtitle">Start trading smarter</p>

    <div class="form-group">
      <label>Full name</label>
      <input type="text" placeholder="Your name" [(ngModel)]="fullName" />
    </div>

    <div class="form-group">
      <label>Email</label>
      <input type="email" placeholder="you@email.com" [(ngModel)]="email" />
    </div>

    <div class="form-group">
      <label>Password</label>
      <input type="password" placeholder="••••••••" [(ngModel)]="password" />
    </div>

    <div class="form-group">
      <label>Confirm password</label>
      <input type="password" placeholder="••••••••" [(ngModel)]="confirmPassword" />
    </div>

    <p class="error" *ngIf="errorMessage">{{ errorMessage }}</p>

    <button class="btn-primary" (click)="onSignup()">Create account</button>

    <p class="switch">Already have an account? <a routerLink="/login">Log in</a></p>

  </div>
</div>
